; alembic configuration for z4j-brain
;
; The actual database URL is read from the Z4J_DATABASE_URL environment
; variable inside env.py (NOT from sqlalchemy.url here) so the brain
; never duplicates configuration between settings.py and alembic.ini.
;
; All migration files live next to the application source so they
; ship inside the wheel.

[alembic]
script_location = src/z4j_brain/migrations
prepend_sys_path = src
path_separator = os
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

# Empty - env.py reads it from settings.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
