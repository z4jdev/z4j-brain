; alembic configuration bundled INTO the z4j-brain wheel.
;
; This file ships alongside the installed ``z4j_brain`` package so
; ``pip install z4j-brain && z4j-brain migrate upgrade head`` works
; out of the box without requiring the operator to ship an
; ``alembic.ini`` of their own.
;
; Uses Python package notation (``z4j_brain:migrations``) for
; ``script_location`` so alembic resolves migrations through
; ``importlib`` against the installed wheel, independent of the
; filesystem layout (editable install vs. wheel, site-packages vs.
; volume-mounted, etc.). The source-tree alembic.ini at
; ``backend/alembic.ini`` keeps the relative path form for the
; contributor flow.
;
; The database URL is ALWAYS pulled from ``Z4J_DATABASE_URL`` by
; ``env.py`` - never duplicated here.

[alembic]
script_location = z4j_brain:migrations
path_separator = os
timezone = UTC

sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
